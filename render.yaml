services:
  - type: web
    name: tech-support-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.mjs
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/data
    envVars:
      - key: OWNER_EMAIL
        value: chegekeith4@gmail.com
      - key: OWNER_USERNAME
        value: owner
      - key: OWNER_FULL_NAME
        value: KCJ Tech Owner
      - key: OWNER_INITIAL_PASSWORD
        sync: false
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_REPLY_TO
        value: chegekeith4@gmail.com
      - key: PASSWORD_RESET_CODE_TTL_MINUTES
        value: "10"
      - key: PASSWORD_RESET_MAX_ATTEMPTS
        value: "5"
      - key: PASSWORD_RESET_COOLDOWN_SECONDS
        value: "60"

  - type: web
    name: tech-support-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        value: https://tech-support-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
