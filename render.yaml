services:
  - type: web
    name: tech-support-api
    runtime: node
    plan: starter
    buildCommand: npm install
    startCommand: node server.mjs
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    disk:
      name: sqlite-data
      mountPath: /opt/render/project/src/data
    envVars:
      - key: OWNER_EMAIL
        value: chegekeith4@gmail.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  - type: web
    name: tech-support-web
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    autoDeployTrigger: commit
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
